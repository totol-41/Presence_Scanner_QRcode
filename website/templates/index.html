<!DOCTYPE html>
<html data-bs-theme="auto">
<head>
    <title>Présence Qrcode</title>    
    <meta charset="utf-8">
    <link rel="icon" href="static/img/icone.ico" />

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">

    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/js/bootstrap.bundle.min.js"></script>

    <link href="static/style/style.css" rel="stylesheet">

    <script src="static/script/qrcode/qrcode.min.js" defer></script>
    <script src="static/script/script.js" defer></script>

<meta name="viewport" content="width=device-width, initial-scale=1">

</head>
<body>
    <div class="container">
        <nav class="navbar navbar-expand-lg bg-body-tertiary">
            <div class="container-fluid">
                <a class="navbar-brand" href="#">
                    <img src="static/img/icone.ico" alt="Logo" width="30" height="24" class="d-inline-block align-text-top">
                    ESIEA Scan
                </a>

                <!-- Theme Switcher -->
                <div class="d-flex align-items-center ms-auto">
                    <button id="bd-theme" class="btn btn-outline-light dropdown-toggle" type="button" data-bs-toggle="dropdown" aria-label="Theme switcher">
                        <i class="bi bi-circle-half theme-icon-active"></i>
                        <span id="bd-theme-text" class="visually-hidden">Theme</span>
                    </button>
                    <ul class="dropdown-menu dropdown-menu-end w-auto">
                        <li>
                            <button class="dropdown-item d-flex align-items-center" data-bs-theme-value="light">
                                <i class="bi bi-brightness-high-fill me-2"></i> Light
                            </button>
                        </li>
                        <li>
                            <button class="dropdown-item d-flex align-items-center" data-bs-theme-value="dark">
                                <i class="bi bi-moon-stars-fill me-2"></i> Dark
                            </button>
                        </li>
                        <li>
                            <button class="dropdown-item d-flex align-items-center" data-bs-theme-value="auto">
                                <i class="bi bi-circle-half me-2"></i> Auto
                            </button>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>
    </div>
    
    <!-- Contenu principal -->
    <div class="container mt-4">
        <div class="row">
            <div class="col-12 col-md-6 col-lg-6">
            <form class="row g-3 needs-validation" novalidate>
                <div class="col-md-4">
                    <label for="validationDefault01" class="form-label">Login</label>
                    <input type="text" class="form-control" id="login" required>
                </div>
  
                <div class="col-12">
                    <button class="btn btn-info" id="generate" type="submit">Generate</button>
                    <button class="btn btn-success" id="downlad" type="button">Download</button>
                </div>
            </form>
            </div>
                          
            <div class="col-12 col-md-6 col-lg-6 text-center">
                <br>
                <div id="qrcode"></div>
            </div>
        </div>

    </div>
    
    
</body>
